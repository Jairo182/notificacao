<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head>    <meta charset="UTF-8">    <title>Notificação de Tarefa</title>    <style>        body {            font-family: Arial, sans-serif;            background-color: #f4f4f4;            margin: 0;            padding: 20px;        }        .container {            max-width: 600px;            margin: auto;            background-color: #ffffff;            padding: 30px;            border-radius: 8px;            box-shadow: 0 2px 8px rgba(0,0,0,0.1);        }        .header {            background-color: #1976d2;            color: white;            text-align: center;            padding: 15px;            border-radius: 8px 8px 0 0;            margin: -30px -30px 20px -30px;        }        .titulo {            color: #1976d2;            font-size: 20px;            font-weight: bold;        }        .descricao {            background-color: #f8f9fa;            border-left: 4px solid #1976d2;            padding: 15px;            margin: 15px 0;        }        .footer {            margin-top: 30px;            text-align: center;            color: #777;            font-size: 13px;        }    </style></head><body><div class="container">    <div class="header">        <h2>Notificação de Tarefa</h2>    </div>    <p>        Aviso: Sua tarefa        <strong th:text="${nomeTarefa}">Nome da Tarefa</strong>        está agendada para hoje às        <strong th:text="${horario}">Horário</strong>.    </p>    <p>Confira sua descrição:</p>    <div class="descricao">        <p th:text="${descricaoTarefa}">            Descrição da Tarefa        </p>    </div>    <div class="footer">        <p>Obrigado por usar nosso sistema de tarefas.</p>    </div></div></body></html>
